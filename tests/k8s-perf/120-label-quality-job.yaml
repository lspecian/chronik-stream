apiVersion: batch/v1
kind: Job
metadata:
  name: label-quality-eval
  namespace: chronik-perf
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 1800
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: dell-1
      containers:
        - name: evaluator
          image: python:3.12-slim
          env:
            - name: CHRONIK_URL
              value: "http://chronik-thunderbird.chronik-perf.svc.cluster.local:6092"
            - name: TOPIC
              value: "amazon-appliances-labeled"
            - name: OUTPUT_DIR
              value: "/results"
          command: ["python3", "/scripts/label-quality.py"]
          volumeMounts:
            - name: script
              mountPath: /scripts
            - name: results
              mountPath: /results
          resources:
            requests:
              cpu: "1"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
      volumes:
        - name: script
          configMap:
            name: label-quality-script
        - name: results
          hostPath:
            path: /home/ubuntu/datasets/amazon/results
            type: DirectoryOrCreate
