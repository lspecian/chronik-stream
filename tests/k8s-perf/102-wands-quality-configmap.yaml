apiVersion: v1
kind: ConfigMap
metadata:
  name: wands-quality-script
  namespace: chronik-perf
data:
  wands-quality.py: |
    #!/usr/bin/env python3
    """
    WANDS Search Quality Evaluation (DV-1)
    =======================================
    Runs all 480 WANDS queries across 4 search modes,
    computes NDCG@10, Precision@10, and MRR against ground-truth labels.

    Modes:
      - bm25:   Elasticsearch-compatible /_search (Tantivy BM25)
      - vector: /_vector/{topic}/search (HNSW + OpenAI embeddings)
      - hybrid: /_vector/{topic}/hybrid (RRF fusion)
      - sql:    /_sql (SQL LIKE scan — baseline, not ranked)
    """
    import csv, json, math, os, sys, time, base64

    try:
        import requests
    except ImportError:
        import subprocess
        subprocess.check_call([sys.executable, '-m', 'pip', 'install', 'requests', '-q'])
        import requests

    CHRONIK_URL = os.environ.get('CHRONIK_URL',
        'http://chronik-thunderbird.chronik-perf.svc.cluster.local:6092')
    # For distributed fan-out: list of all node URLs (Tantivy is per-partition)
    CHRONIK_NODES = os.environ.get('CHRONIK_NODES', '').split(',') if os.environ.get('CHRONIK_NODES') else []
    TOPIC = os.environ.get('TOPIC', 'wands')
    DATA_DIR = os.environ.get('DATA_DIR', '/data')
    OUTPUT_DIR = os.environ.get('OUTPUT_DIR', '/results')
    K = int(os.environ.get('K', '10'))
    TIMEOUT = int(os.environ.get('REQUEST_TIMEOUT', '30'))

    # Auto-discover node IPs if not provided
    if not CHRONIK_NODES:
        # Try to discover via DNS/headless service
        try:
            import socket
            svc_name = 'chronik-thunderbird.chronik-perf.svc.cluster.local'
            ips = set()
            for info in socket.getaddrinfo(svc_name, 6092, socket.AF_INET, socket.SOCK_STREAM):
                ips.add(info[4][0])
            if len(ips) > 1:
                CHRONIK_NODES = [f'http://{ip}:6092' for ip in sorted(ips)]
        except Exception:
            pass
    # If still no nodes, try the 3 known pod IPs via health check
    if not CHRONIK_NODES:
        discovered = []
        for pod_idx in range(1, 4):
            # Try headless service names
            for hostname in [f'chronik-thunderbird-{pod_idx}.chronik-perf.svc.cluster.local']:
                try:
                    url = f'http://{hostname}:6092'
                    r = requests.get(f'{url}/health', timeout=3)
                    if r.status_code == 200:
                        discovered.append(url)
                        break
                except Exception:
                    pass
        if discovered:
            CHRONIK_NODES = discovered

    # ── Load ground truth ──────────────────────────────────────────────

    print('DV-1: WANDS Search Quality Evaluation')
    print(f'  Chronik URL: {CHRONIK_URL}')
    print(f'  Topic:       {TOPIC}')
    print(f'  K:           {K}')
    print()

    # query.csv: query_id, query, query_class (TSV format)
    queries = {}
    query_path = os.path.join(DATA_DIR, 'query.csv')
    with open(query_path, 'r', encoding='utf-8') as f:
        for row in csv.DictReader(f, delimiter='\t'):
            queries[int(row['query_id'])] = row['query']
    print(f'  Loaded {len(queries)} queries')

    # label.csv: id, query_id, product_id, label (TSV format)
    RELEVANCE = {'Exact': 3, 'Partial': 1, 'Irrelevant': 0}
    labels = {}  # query_id -> {product_id: score}
    label_path = os.path.join(DATA_DIR, 'label.csv')
    with open(label_path, 'r', encoding='utf-8') as f:
        for row in csv.DictReader(f, delimiter='\t'):
            qid = int(row['query_id'])
            pid = int(row['product_id'])
            labels.setdefault(qid, {})[pid] = RELEVANCE.get(row['label'], 0)
    total_labels = sum(len(v) for v in labels.values())
    print(f'  Loaded {total_labels:,} relevance labels for {len(labels)} queries')

    # ── Helper: extract product_id from various response formats ──────

    HEADERS = {'Content-Type': 'application/json'}

    def extract_pid_from_source(src):
        """Extract product_id from a Tantivy search hit _source."""
        if not isinstance(src, dict):
            return None
        # Method 1: _key is the product_id string (set by loader)
        key = src.get('_key')
        if key is not None:
            try:
                return int(key)
            except (ValueError, TypeError):
                pass
        # Method 2: _json_content may contain product_id
        jc = src.get('_json_content')
        if isinstance(jc, dict):
            pid = jc.get('product_id')
            if pid is not None:
                try:
                    return int(pid)
                except (ValueError, TypeError):
                    pass
        if isinstance(jc, str):
            try:
                doc = json.loads(jc)
                pid = doc.get('product_id')
                if pid is not None:
                    return int(pid)
            except (json.JSONDecodeError, ValueError, TypeError):
                pass
        # Method 3: _value may be JSON text or base64-encoded JSON
        val = src.get('_value')
        if isinstance(val, str):
            # Try as direct JSON
            try:
                doc = json.loads(val)
                if isinstance(doc, dict):
                    pid = doc.get('product_id')
                    if pid is not None:
                        return int(pid)
            except (json.JSONDecodeError, ValueError, TypeError):
                pass
            # Try as base64-encoded JSON
            try:
                decoded = base64.b64decode(val).decode('utf-8')
                doc = json.loads(decoded)
                if isinstance(doc, dict):
                    pid = doc.get('product_id')
                    if pid is not None:
                        return int(pid)
            except Exception:
                pass
        return None

    def extract_pid_from_sql_row(row):
        """Extract product_id from a SQL result row."""
        if not isinstance(row, dict):
            return None
        # Check for explicit product_id column (from json_extract_int UDF)
        pid = row.get('product_id')
        if pid is not None:
            try:
                return int(pid)
            except (ValueError, TypeError):
                pass
        # Try _value column (may be base64 or JSON string)
        val = row.get('_value')
        if isinstance(val, str):
            try:
                doc = json.loads(val)
                if isinstance(doc, dict):
                    return int(doc.get('product_id', 0))
            except (json.JSONDecodeError, ValueError, TypeError):
                pass
            try:
                decoded = base64.b64decode(val).decode('utf-8')
                doc = json.loads(decoded)
                if isinstance(doc, dict):
                    return int(doc.get('product_id', 0))
            except Exception:
                pass
        return None

    # ── Search functions ───────────────────────────────────────────────

    def search_bm25_single(url, query_text, k):
        """BM25 search on a single node."""
        body = {
            'index': TOPIC,
            'query': {'match': {'_all': query_text}},
            'size': k,
        }
        try:
            r = requests.post(
                f'{url}/_search',
                json=body, headers=HEADERS, timeout=TIMEOUT)
            if r.status_code != 200:
                return []
            data = r.json()
            hits = data.get('hits', {}).get('hits', [])
            results = []
            for hit in hits:
                src = hit.get('_source', {})
                pid = extract_pid_from_source(src)
                score = hit.get('_score', 0.0)
                if pid is not None:
                    results.append((pid, score))
            return results
        except Exception:
            return []

    def search_bm25(query_text, k):
        """BM25 text search with fan-out to all cluster nodes."""
        urls = CHRONIK_NODES if CHRONIK_NODES else [CHRONIK_URL]
        all_results = []
        for url in urls:
            all_results.extend(search_bm25_single(url, query_text, k))
        # Deduplicate by product_id, keep highest score
        pid_scores = {}
        for pid, score in all_results:
            if pid not in pid_scores or score > pid_scores[pid]:
                pid_scores[pid] = score
        # Sort by score descending and take top-k
        sorted_pids = sorted(pid_scores.items(), key=lambda x: -x[1])
        return [pid for pid, score in sorted_pids[:k]]

    def resolve_offsets_to_product_ids(offsets):
        """Resolve WAL offsets to product_ids via SQL json_extract_int UDF."""
        if not offsets:
            return []
        table = TOPIC.replace('-', '_') + '_hot'
        offset_list = ','.join(str(o) for o in offsets)
        sql = (f"SELECT _offset, json_extract_int(_value, '$.product_id') AS product_id "
               f"FROM {table} WHERE _offset IN ({offset_list})")
        try:
            r = requests.post(
                f'{SQL_URL}/_sql',
                json={'query': sql}, headers=HEADERS, timeout=TIMEOUT)
            if r.status_code != 200:
                # Fallback: try with decode_utf8 approach
                return resolve_offsets_fallback(offsets)
            data = r.json()
            rows = data.get('rows', []) if isinstance(data, dict) else data
            offset_to_pid = {}
            for row in rows:
                if not isinstance(row, dict):
                    continue
                off = row.get('_offset')
                pid = row.get('product_id')
                if off is not None and pid is not None:
                    offset_to_pid[int(off)] = int(pid)
            return [offset_to_pid.get(o) for o in offsets]
        except Exception:
            return resolve_offsets_fallback(offsets)

    def resolve_offsets_fallback(offsets):
        """Fallback: resolve offsets using raw _value with base64 decode."""
        if not offsets:
            return []
        table = TOPIC.replace('-', '_') + '_hot'
        offset_list = ','.join(str(o) for o in offsets)
        sql = f"SELECT _offset, _value FROM {table} WHERE _offset IN ({offset_list})"
        try:
            r = requests.post(
                f'{SQL_URL}/_sql',
                json={'query': sql}, headers=HEADERS, timeout=TIMEOUT)
            if r.status_code != 200:
                return [None] * len(offsets)
            data = r.json()
            rows = data.get('rows', []) if isinstance(data, dict) else data
            offset_to_pid = {}
            for row in rows:
                if not isinstance(row, dict):
                    continue
                pid = extract_pid_from_sql_row(row)
                off = row.get('_offset')
                if pid is not None and off is not None:
                    offset_to_pid[int(off)] = pid
            return [offset_to_pid.get(o) for o in offsets]
        except Exception:
            return [None] * len(offsets)

    def search_vector(query_text, k):
        """Semantic vector search via /_vector/{topic}/search."""
        body = {'query': query_text, 'k': k}
        try:
            r = requests.post(
                f'{VECTOR_URL}/_vector/{TOPIC}/search',
                json=body, headers=HEADERS, timeout=TIMEOUT)
            if r.status_code != 200:
                return []
            data = r.json()
            offsets = [result.get('offset') for result in data.get('results', [])]
            pids = resolve_offsets_to_product_ids(offsets)
            return [pid for pid in pids if pid is not None]
        except Exception:
            return []

    def search_hybrid(query_text, k):
        """Client-side RRF hybrid: fan-out BM25 (all nodes) + vector, fuse with RRF.

        The server-side /_vector/{topic}/hybrid only uses the local node's Tantivy
        index (~1/3 of docs). Client-side hybrid uses the full fan-out BM25 results
        (all 3 nodes) merged with vector results via Reciprocal Rank Fusion.
        """
        RRF_K = int(os.environ.get('RRF_K_HYBRID', '15'))

        # Get BM25 results with scores (fan-out to all nodes)
        urls = CHRONIK_NODES if CHRONIK_NODES else [CHRONIK_URL]
        bm25_all = []
        for url in urls:
            bm25_all.extend(search_bm25_single(url, query_text, k * 2))
        # Deduplicate by PID, keep highest score
        bm25_by_pid = {}
        for pid, score in bm25_all:
            if pid not in bm25_by_pid or score > bm25_by_pid[pid]:
                bm25_by_pid[pid] = score
        bm25_ranked = sorted(bm25_by_pid.items(), key=lambda x: -x[1])

        # Get vector results (already routes to VECTOR_URL)
        vector_pids = search_vector(query_text, k * 2)

        # Weighted RRF: BM25 gets higher weight since it's the stronger ranker
        W_BM25 = float(os.environ.get('RRF_W_BM25', '0.6'))
        W_VECTOR = float(os.environ.get('RRF_W_VECTOR', '0.4'))
        rrf_scores = {}
        for rank, (pid, _) in enumerate(bm25_ranked):
            rrf_scores[pid] = rrf_scores.get(pid, 0.0) + W_BM25 / (RRF_K + rank + 1)
        for rank, pid in enumerate(vector_pids):
            rrf_scores[pid] = rrf_scores.get(pid, 0.0) + W_VECTOR / (RRF_K + rank + 1)

        # Sort by RRF score descending
        fused = sorted(rrf_scores.items(), key=lambda x: -x[1])
        return [pid for pid, _ in fused[:k]]

    def search_server_hybrid(query_text, k):
        """Server-side hybrid: calls /_vector/{topic}/hybrid which does RRF fusion
        internally (BM25 from Tantivy + vector from HNSW). In cluster mode the
        distributed query layer fans out to peer nodes automatically.

        This replaces the client-side RRF hack used in DV-1 v1.
        """
        W_BM25 = float(os.environ.get('RRF_W_BM25', '0.6'))
        W_VECTOR = float(os.environ.get('RRF_W_VECTOR', '0.4'))
        RRF_K = int(os.environ.get('RRF_K_HYBRID', '15'))
        body = {
            'query': query_text,
            'k': k,
            'vector_weight': W_VECTOR,
            'text_weight': W_BM25,
            'rrf_k': RRF_K,
        }
        try:
            r = requests.post(
                f'{VECTOR_URL}/_vector/{TOPIC}/hybrid',
                json=body, headers=HEADERS, timeout=TIMEOUT)
            if r.status_code != 200:
                return []
            data = r.json()
            offsets = [result.get('offset') for result in data.get('results', [])]
            pids = resolve_offsets_to_product_ids(offsets)
            return [pid for pid in pids if pid is not None]
        except Exception:
            return []

    def search_sql_single(url, query_text, k):
        """SQL LIKE scan on a single node."""
        table = TOPIC.replace('-', '_') + '_hot'
        escaped = query_text.replace("'", "''").replace('%', '\\\\%')
        sql = (f"SELECT _offset, json_extract_int(_value, '$.product_id') AS product_id "
               f"FROM {table} "
               f"WHERE decode_utf8(_value) LIKE '%{escaped}%' "
               f"LIMIT {k}")
        try:
            r = requests.post(
                f'{url}/_sql',
                json={'query': sql}, headers=HEADERS, timeout=TIMEOUT)
            if r.status_code != 200:
                return []
            data = r.json()
            rows = data.get('rows', []) if isinstance(data, dict) else data
            ids = []
            for row in rows:
                if not isinstance(row, dict):
                    continue
                pid = row.get('product_id')
                if pid is not None:
                    try:
                        ids.append(int(pid))
                    except (ValueError, TypeError):
                        pass
            return ids
        except Exception:
            return []

    def search_sql(query_text, k):
        """SQL LIKE scan with fan-out to all nodes with hot buffers."""
        urls = CHRONIK_NODES if CHRONIK_NODES else [CHRONIK_URL]
        all_ids = []
        seen = set()
        for url in urls:
            for pid in search_sql_single(url, query_text, k):
                if pid not in seen:
                    seen.add(pid)
                    all_ids.append(pid)
                if len(all_ids) >= k:
                    break
            if len(all_ids) >= k:
                break
        return all_ids[:k]

    # ── IR Metrics ─────────────────────────────────────────────────────

    def dcg_at_k(relevances, k):
        """Discounted Cumulative Gain at k."""
        dcg = 0.0
        for i, rel in enumerate(relevances[:k]):
            dcg += rel / math.log2(i + 2)  # 1-indexed positions
        return dcg

    def ndcg_at_k(retrieved_ids, ground_truth, k):
        """Normalized DCG@k."""
        rels = [ground_truth.get(pid, 0) for pid in retrieved_ids[:k]]
        dcg = dcg_at_k(rels, k)
        ideal = sorted(ground_truth.values(), reverse=True)
        idcg = dcg_at_k(ideal, k)
        return dcg / idcg if idcg > 0 else 0.0

    def precision_at_k(retrieved_ids, ground_truth, k):
        """Fraction of top-k that are relevant (score > 0)."""
        if k == 0:
            return 0.0
        relevant = sum(1 for pid in retrieved_ids[:k] if ground_truth.get(pid, 0) > 0)
        return relevant / min(k, max(len(retrieved_ids), 1))

    def mrr(retrieved_ids, ground_truth):
        """Mean Reciprocal Rank: 1/rank of first Exact match (score == 3)."""
        for i, pid in enumerate(retrieved_ids):
            if ground_truth.get(pid, 0) == 3:
                return 1.0 / (i + 1)
        return 0.0

    # ── Sanity check ───────────────────────────────────────────────────

    print(f'  Nodes:       {len(CHRONIK_NODES)} discovered')
    for n in CHRONIK_NODES:
        print(f'    - {n}')
    if not CHRONIK_NODES:
        print(f'    (using single URL: {CHRONIK_URL})')

    # Detect which nodes have vector index and hot buffer
    VECTOR_URL = CHRONIK_URL
    SQL_URL = CHRONIK_URL
    for url in (CHRONIK_NODES or [CHRONIK_URL]):
        try:
            r = requests.get(f'{url}/_vector/{TOPIC}/stats', timeout=5)
            if r.status_code == 200:
                stats = r.json()
                if stats.get('total_vectors', 0) > 0:
                    VECTOR_URL = url
                    print(f'  Vector node: {url} ({stats["total_vectors"]} vectors)')
                    break
        except Exception:
            pass
    for url in (CHRONIK_NODES or [CHRONIK_URL]):
        table = TOPIC.replace('-', '_') + '_hot'
        try:
            r = requests.post(f'{url}/_sql',
                json={'query': f'SELECT COUNT(*) AS cnt FROM {table}'},
                headers=HEADERS, timeout=5)
            if r.status_code == 200:
                data = r.json()
                cnt = data.get('rows', [{}])[0].get('cnt', 0)
                if cnt > 0:
                    SQL_URL = url
                    print(f'  SQL node:    {url} ({cnt:,} hot buffer rows)')
                    break
        except Exception:
            pass
    print()
    print('  Running sanity checks...')
    sanity_ok = True

    # Check BM25
    try:
        r = requests.post(f'{CHRONIK_URL}/_search',
            json={'index': TOPIC, 'query': {'match': {'_all': 'chair'}}, 'size': 3},
            headers=HEADERS, timeout=TIMEOUT)
        bm25_hits = r.json().get('hits', {}).get('hits', []) if r.status_code == 200 else []
        print(f'    BM25 sanity: {len(bm25_hits)} hits, '
              f'scores={[h.get("_score", 0) for h in bm25_hits[:3]]}')
        if bm25_hits:
            src = bm25_hits[0].get('_source', {})
            pid = extract_pid_from_source(src)
            print(f'    BM25 first hit product_id: {pid}, _key={src.get("_key")}')
    except Exception as e:
        print(f'    BM25 sanity FAILED: {e}')
        sanity_ok = False

    # Check Vector
    try:
        r = requests.post(f'{VECTOR_URL}/_vector/{TOPIC}/search',
            json={'query': 'comfortable outdoor furniture', 'k': 3},
            headers=HEADERS, timeout=TIMEOUT)
        if r.status_code == 200:
            vdata = r.json()
            vresults = vdata.get('results', [])
            print(f'    Vector sanity: {len(vresults)} results')
            if vresults:
                offsets = [res.get('offset') for res in vresults]
                pids = resolve_offsets_to_product_ids(offsets)
                print(f'    Vector offsets={offsets}, product_ids={pids}')
        else:
            print(f'    Vector sanity: HTTP {r.status_code}')
    except Exception as e:
        print(f'    Vector sanity FAILED: {e}')

    # Check SQL UDFs
    try:
        table = TOPIC.replace('-', '_') + '_hot'
        r = requests.post(f'{SQL_URL}/_sql',
            json={'query': f"SELECT json_extract_int(_value, '$.product_id') AS pid FROM {table} LIMIT 3"},
            headers=HEADERS, timeout=TIMEOUT)
        if r.status_code == 200:
            rows = r.json().get('rows', [])
            pids = [row.get('pid') for row in rows if isinstance(row, dict)]
            print(f'    SQL UDF sanity: json_extract_int works, pids={pids}')
        else:
            print(f'    SQL UDF sanity: HTTP {r.status_code} - {r.text[:200]}')
    except Exception as e:
        print(f'    SQL UDF sanity FAILED: {e}')

    print()

    # ── Run evaluation ─────────────────────────────────────────────────

    MODES = {
        'bm25': search_bm25,
        'vector': search_vector,
        'hybrid': search_hybrid,
        'srv_hybrid': search_server_hybrid,
        'sql': search_sql,
    }

    results = {mode: {
        'ndcg': [], 'precision': [], 'mrr': [],
        'latencies': [], 'errors': 0, 'empty': 0,
    } for mode in MODES}

    total_queries = len(queries)
    eval_start = time.time()

    for idx, (qid, query_text) in enumerate(queries.items()):
        gt = labels.get(qid, {})
        if not gt:
            continue  # Skip queries without ground truth

        for mode_name, search_fn in MODES.items():
            start = time.time()
            try:
                retrieved = search_fn(query_text, K)
                elapsed_ms = (time.time() - start) * 1000

                if not retrieved:
                    results[mode_name]['empty'] += 1

                results[mode_name]['ndcg'].append(ndcg_at_k(retrieved, gt, K))
                results[mode_name]['precision'].append(precision_at_k(retrieved, gt, K))
                results[mode_name]['mrr'].append(mrr(retrieved, gt))
                results[mode_name]['latencies'].append(elapsed_ms)
            except Exception as e:
                results[mode_name]['errors'] += 1

        if (idx + 1) % 50 == 0:
            elapsed = time.time() - eval_start
            qps = (idx + 1) * len(MODES) / elapsed
            print(f'  {idx+1}/{total_queries} queries evaluated ({qps:.1f} req/s)')

    eval_elapsed = time.time() - eval_start

    # ── Print results ──────────────────────────────────────────────────

    print()
    print('=' * 72)
    print('  DV-1: WANDS Search Quality Results')
    print('=' * 72)
    print()
    print(f'  {"Mode":<12} {"NDCG@"+str(K):<12} {"Prec@"+str(K):<12} {"MRR":<10} '
          f'{"p50 (ms)":<12} {"Errors":<8} {"Empty":<8}')
    print(f'  {"-"*12} {"-"*12} {"-"*12} {"-"*10} {"-"*12} {"-"*8} {"-"*8}')

    report = {}
    for mode_name, m in results.items():
        n = len(m['ndcg'])
        if n == 0:
            print(f'  {mode_name:<12} (no results)')
            continue

        avg_ndcg = sum(m['ndcg']) / n
        avg_prec = sum(m['precision']) / n
        avg_mrr = sum(m['mrr']) / n
        lats = sorted(m['latencies'])
        p50 = lats[n // 2] if n > 0 else 0
        p95 = lats[int(n * 0.95)] if n > 0 else 0

        print(f'  {mode_name:<12} {avg_ndcg:<12.4f} {avg_prec:<12.4f} {avg_mrr:<10.4f} '
              f'{p50:<12.1f} {m["errors"]:<8} {m["empty"]:<8}')

        report[mode_name] = {
            'ndcg_at_k': round(avg_ndcg, 4),
            'precision_at_k': round(avg_prec, 4),
            'mrr': round(avg_mrr, 4),
            'latency_p50_ms': round(p50, 1),
            'latency_p95_ms': round(p95, 1),
            'errors': m['errors'],
            'empty_results': m['empty'],
            'queries_evaluated': n,
        }

    # ── Success criteria ───────────────────────────────────────────────

    print()
    bm25_ndcg = report.get('bm25', {}).get('ndcg_at_k', 0)
    hybrid_ndcg = report.get('hybrid', {}).get('ndcg_at_k', 0)

    bm25_pass = bm25_ndcg >= 0.50
    hybrid_pass = hybrid_ndcg >= 0.58

    print(f'  Success Criteria:')
    print(f'    BM25 NDCG@{K} >= 0.50:   {"PASS" if bm25_pass else "FAIL"} ({bm25_ndcg:.4f})')
    print(f'    Hybrid NDCG@{K} >= 0.58: {"PASS" if hybrid_pass else "FAIL"} ({hybrid_ndcg:.4f})')
    print()

    # Published baselines for comparison
    print(f'  Published Baselines:')
    print(f'    ES BM25:           ~0.50-0.56')
    print(f'    ES Hybrid (kNN):   ~0.58-0.65')
    print(f'    Agentic (LLM):     ~0.65-0.72')
    print()
    print(f'  Total evaluation time: {eval_elapsed:.1f}s')
    print(f'  Total requests: {sum(len(m["ndcg"]) for m in results.values()):,}')

    # ── Save JSON report ───────────────────────────────────────────────

    os.makedirs(OUTPUT_DIR, exist_ok=True)
    report_data = {
        'dataset': 'WANDS (Wayfair Annotation Dataset)',
        'topic': TOPIC,
        'k': K,
        'total_queries': total_queries,
        'evaluation_time_s': round(eval_elapsed, 1),
        'modes': report,
        'success_criteria': {
            'bm25_ndcg_threshold': 0.50,
            'bm25_ndcg_actual': bm25_ndcg,
            'bm25_pass': bm25_pass,
            'hybrid_ndcg_threshold': 0.58,
            'hybrid_ndcg_actual': hybrid_ndcg,
            'hybrid_pass': hybrid_pass,
        },
    }
    report_path = os.path.join(OUTPUT_DIR, 'wands-quality-report.json')
    with open(report_path, 'w') as f:
        json.dump(report_data, f, indent=2)
    print(f'  Report saved: {report_path}')

    # Exit code based on pass/fail
    if bm25_pass and hybrid_pass:
        print('\n  ALL CRITERIA PASSED')
        sys.exit(0)
    else:
        print('\n  SOME CRITERIA FAILED')
        sys.exit(1)
