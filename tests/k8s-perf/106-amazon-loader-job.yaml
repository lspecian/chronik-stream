apiVersion: batch/v1
kind: Job
metadata:
  name: amazon-appliances-loader
  namespace: chronik-perf
spec:
  backoffLimit: 3
  # 602K records — generous 2-hour timeout
  activeDeadlineSeconds: 7200
  template:
    spec:
      restartPolicy: OnFailure
      # Pin to dell-1 where the dataset is downloaded via hostPath
      nodeSelector:
        kubernetes.io/hostname: dell-1
      containers:
        - name: loader
          image: python:3.12-slim
          env:
            - name: BOOTSTRAP_SERVERS
              value: "chronik-thunderbird.chronik-perf.svc.cluster.local:9092"
            - name: TOPIC
              value: "amazon-appliances"
            - name: DATA_FILE
              value: "/data/Appliances.jsonl"
            - name: MAX_RECORDS
              value: "0"
            - name: BATCH_SIZE
              value: "5000"
            - name: NUM_PARTITIONS
              value: "6"
            - name: ENABLE_VECTOR
              value: "false"
            - name: SKIP_TOPIC_CREATE
              value: "true"
            - name: PYTHONUNBUFFERED
              value: "1"
          command: ["python3", "-u", "/scripts/amazon-loader.py"]
          volumeMounts:
            - name: script
              mountPath: /scripts
            - name: dataset
              mountPath: /data
              readOnly: true
          resources:
            requests:
              cpu: "2"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "2Gi"
      volumes:
        - name: script
          configMap:
            name: amazon-loader-script
        - name: dataset
          hostPath:
            path: /home/ubuntu/datasets/amazon
            type: Directory
