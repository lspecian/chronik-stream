apiVersion: batch/v1
kind: Job
metadata:
  name: thunderbird-loader
  namespace: chronik-perf
spec:
  backoffLimit: 3
  # Long deadline — 16.6M messages at ~3.5K msg/s ≈ 80 min
  activeDeadlineSeconds: 7200
  template:
    spec:
      restartPolicy: OnFailure
      # Pin to dell-1 where the dataset is copied via hostPath
      nodeSelector:
        kubernetes.io/hostname: dell-1
      containers:
        - name: loader
          image: python:3.12-slim
          env:
            - name: BOOTSTRAP_SERVERS
              value: "chronik-thunderbird.chronik-perf.svc.cluster.local:9092"
            - name: TOPIC
              value: "thunderbird"
            - name: LOG_FILE
              value: "/data/Thunderbird_full.log"
            - name: MAX_LINES
              value: "0"
            - name: BATCH_SIZE
              value: "5000"
          command: ["python3", "/scripts/thunderbird-loader.py"]
          volumeMounts:
            - name: script
              mountPath: /scripts
            - name: dataset
              mountPath: /data
              readOnly: true
          resources:
            requests:
              cpu: "2"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "2Gi"
      volumes:
        - name: script
          configMap:
            name: thunderbird-loader-script
        - name: dataset
          hostPath:
            path: /home/ubuntu/datasets/thunderbird/Thunderbird
            type: Directory
