apiVersion: batch/v1
kind: Job
metadata:
  name: sentiment-rating-labeler
  namespace: chronik-perf
spec:
  backoffLimit: 1
  # Labeling is fast (pure Python) — 1 hour for up to 5M reviews
  activeDeadlineSeconds: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: labeler
          image: python:3.12-slim
          env:
            - name: BOOTSTRAP_SERVERS
              value: "chronik-thunderbird.chronik-perf.svc.cluster.local:9092"
            - name: SOURCE_TOPIC
              value: "amazon-appliances"
            - name: DEST_TOPIC
              value: "amazon-appliances-labeled"
            - name: MAX_RECORDS
              value: "0"
            - name: BATCH_SIZE
              value: "5000"
            - name: CONSUMER_TIMEOUT_MS
              value: "30000"
            - name: NUM_PARTITIONS
              value: "6"
          command: ["python3", "/scripts/sentiment-rating-labeler.py"]
          volumeMounts:
            - name: script
              mountPath: /scripts
          resources:
            requests:
              cpu: "2"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "2Gi"
      volumes:
        - name: script
          configMap:
            name: sentiment-rating-script
