apiVersion: batch/v1
kind: Job
metadata:
  name: amazon-electronics-loader
  namespace: chronik-perf
spec:
  backoffLimit: 3
  # 10-20M records — 4-hour timeout
  activeDeadlineSeconds: 14400
  template:
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        kubernetes.io/hostname: dell-1
      containers:
        - name: loader
          image: python:3.12-slim
          env:
            - name: BOOTSTRAP_SERVERS
              value: "chronik-thunderbird.chronik-perf.svc.cluster.local:9092"
            - name: TOPIC
              value: "amazon-electronics"
            - name: DATA_FILE
              value: "/data/Electronics.jsonl"
            - name: MAX_RECORDS
              value: "10000000"
            - name: BATCH_SIZE
              value: "5000"
            - name: NUM_PARTITIONS
              value: "24"
            - name: ENABLE_VECTOR
              value: "false"
          command: ["python3", "/scripts/amazon-loader.py"]
          volumeMounts:
            - name: script
              mountPath: /scripts
            - name: dataset
              mountPath: /data
              readOnly: true
          resources:
            requests:
              cpu: "2"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
      volumes:
        - name: script
          configMap:
            name: amazon-loader-script
        - name: dataset
          hostPath:
            path: /home/ubuntu/datasets/amazon
            type: Directory
