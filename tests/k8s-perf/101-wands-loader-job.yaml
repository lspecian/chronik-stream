apiVersion: batch/v1
kind: Job
metadata:
  name: wands-loader
  namespace: chronik-perf
spec:
  backoffLimit: 3
  # 42K products is fast — 30 minutes is generous
  activeDeadlineSeconds: 1800
  template:
    spec:
      restartPolicy: OnFailure
      # Pin to dell-1 where the dataset is copied via hostPath
      nodeSelector:
        kubernetes.io/hostname: dell-1
      containers:
        - name: loader
          image: python:3.12-slim
          env:
            - name: BOOTSTRAP_SERVERS
              value: "chronik-thunderbird.chronik-perf.svc.cluster.local:9092"
            - name: TOPIC
              value: "wands"
            - name: DATA_DIR
              value: "/data"
            - name: BATCH_SIZE
              value: "1000"
          command: ["python3", "/scripts/wands-loader.py"]
          volumeMounts:
            - name: script
              mountPath: /scripts
            - name: dataset
              mountPath: /data
              readOnly: true
          resources:
            requests:
              cpu: "1"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
      volumes:
        - name: script
          configMap:
            name: wands-loader-script
        - name: dataset
          hostPath:
            path: /home/ubuntu/datasets/WANDS/dataset
            type: Directory
