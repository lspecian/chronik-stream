[package]
name = "mock-embedder"
version = "0.0.1"
edition = "2021"
publish = false

[[bin]]
name = "mock-embedder"
path = "main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
hyper = { version = "0.14", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[workspace]
