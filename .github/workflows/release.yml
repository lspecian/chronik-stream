name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.5.0)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  # Build native binaries for releases
  build-binaries:
    name: Build Release Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the other targets when one fails — we want the full picture
      # of which targets are broken, not just the first one to trip.
      fail-fast: false
      matrix:
        include:
          # ── Standalone static binaries (musl), built with `cross` ──
          # These CANNOT carry the `memory` feature: it pulls chronik-memory ->
          # rdkafka -> librdkafka, a C library that does not cross-compile (its
          # CMake cannot see vendored deps in a cross sysroot). See the note on the
          # chronik-memory dependency in crates/chronik-server/Cargo.toml.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: chronik-server-linux-amd64
            use_cross: true
            features: "--no-default-features --features search,backup"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: chronik-server-linux-arm64
            use_cross: true
            features: "--no-default-features --features search,backup"
          # ── glibc builds that back the Docker image, built NATIVELY ──
          # Dockerfile.binary is based on ubuntu:24.04, so static musl buys it
          # nothing, and these are the builds that keep /memory/v1/* in the
          # published container. They carry `memory`, which means librdkafka —
          # so they must NOT use cross. librdkafka only compiles when the build
          # is native to the runner's architecture. Hence a real ARM runner for
          # aarch64 (free on public repos) rather than cross-compiling to it.
          # `memory` is now off by default (see crates/chronik-server/Cargo.toml),
          # so these must opt in explicitly to keep /memory/v1/* in the image. The
          # bare `cargo build` default is clean core; only the shipped Docker image
          # carries memory, and only on glibc.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: chronik-server-linux-amd64-gnu
            use_cross: false
            features: "--features memory"
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: chronik-server-linux-arm64-gnu
            use_cross: false
            features: "--features memory"
          # macOS build (ARM only - Intel is deprecated)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: chronik-server-darwin-arm64
            use_cross: false
            features: ""
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Key these on the runner OS, not on use_cross. The native gnu builds are
      # Linux too, and gating protoc on use_cross would leave them without it —
      # raft-proto's build script shells out to protoc and would fail.
      # cmake is needed by librdkafka (rdkafka's cmake-build feature) on the
      # native gnu builds that carry `memory`.
      - name: Install protoc + cmake (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler cmake

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install protobuf

      - name: Install cross
        if: matrix.use_cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with cross
        if: matrix.use_cross
        env:
          RUSTC_WRAPPER: ""
        run: |
          cross build --release --target ${{ matrix.target }} \
            -p chronik-server --bin chronik-server ${{ matrix.features }}

      - name: Build native
        if: "!matrix.use_cross"
        env:
          RUSTC_WRAPPER: ""  # sccache off for cross-target builds
          # librdkafka's CMakeLists still declares a pre-3.5 cmake_minimum_required,
          # and CMake 4 (shipped on macos-latest) removed that compatibility. Ubuntu
          # 24.04 is still on CMake 3.28, so this only bites the macOS build today —
          # but it will bite any runner that moves to CMake 4. This is the escape
          # hatch CMake itself suggests. Only the `memory` builds reach librdkafka.
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: |
          cargo build --release --target ${{ matrix.target }} \
            -p chronik-server --bin chronik-server ${{ matrix.features }}
          
      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/chronik-server dist/
          cd dist
          tar -czf ${{ matrix.artifact }}.tar.gz chronik-server
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256 || \
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*
          retention-days: 7
      
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  # Build optimized Docker images using Linux binaries
  docker:
    name: Build and Push Docker Images
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          pattern: chronik-server-linux-*
          path: artifacts-download
      
      - name: Prepare artifacts for Docker
        # Use the *-gnu artifacts, not the musl ones. Dockerfile.binary is based on
        # ubuntu:24.04 (glibc), and only the gnu builds carry the `memory` feature —
        # feeding the musl binaries here would silently drop /memory/v1/* from the
        # published image.
        run: |
          mkdir -p artifacts/linux/amd64
          mkdir -p artifacts/linux/arm64

          cd artifacts-download
          tar -xzf chronik-server-linux-amd64-gnu/chronik-server-linux-amd64-gnu.tar.gz -C ../artifacts/linux/amd64/
          tar -xzf chronik-server-linux-arm64-gnu/chronik-server-linux-arm64-gnu.tar.gz -C ../artifacts/linux/arm64/

          # Make binaries executable
          chmod +x ../artifacts/linux/*/chronik-server

          # Verify binaries
          ls -la ../artifacts/linux/*/
          # Fail loudly if the memory surface is missing from the image binary.
          if ! grep -qa "/memory/v1/ingest" ../artifacts/linux/amd64/chronik-server; then
            echo "::error::amd64 image binary has no /memory/v1/* routes — wrong artifact?"
            exit 1
          fi
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image (optimized)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.binary
          platforms: linux/amd64,linux/arm64
          # Only publish images for real tags. A workflow_dispatch run builds the
          # image (exercising Dockerfile.binary and the /memory/v1 artifact guard)
          # without pushing anything to the registry, so the matrix can be
          # validated before minting a tag.
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}

  # Create GitHub release
  release:
    name: Create Release
    # Tags only. Without this, a workflow_dispatch run from a branch would publish
    # a GitHub release named after the branch (github.ref_name == "main").
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-binaries, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
          body: |
            ## Chronik Stream ${{ github.ref_name }}
            
            ### Installation
            
            #### Docker (Recommended)
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```
            
            #### Binary Downloads
            - Linux AMD64: `chronik-server-linux-amd64.tar.gz`
            - Linux ARM64: `chronik-server-linux-arm64.tar.gz`
            - macOS ARM64: `chronik-server-darwin-arm64.tar.gz`
            
            ### Verification
            All binaries include SHA256 checksums for verification.
            
            ### What's Changed
            See the full changelog below.
          generate_release_notes: true